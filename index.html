<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Postcrab Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Onest:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface2: #232328;
    --border: #2e2e35;
    --accent: #ff6b35;
    --text: #f0ede8;
    --text2: #8a8796;
    --bubble-me: #ff6b35;
    --bubble-them: #232328;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Onest', sans-serif; font-size: 15px; }

  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* Header */
  #header {
    flex-shrink: 0; padding: 12px 16px 10px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  #avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #c94b1e);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 14px; color: white; flex-shrink: 0;
  }
  #header-info { flex: 1; min-width: 0; }
  #header-name { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  #header-ad { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 10px; font-size: 11px; color: var(--text2); max-width: 120px; text-align: right; line-height: 1.3; }
  #header-ad span { display: block; color: var(--accent); font-weight: 500; font-size: 12px; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 4px; overscroll-behavior: contain; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .date-sep { text-align: center; font-size: 11px; color: var(--text2); margin: 10px 0 6px; position: relative; }
  .date-sep::before, .date-sep::after { content: ''; position: absolute; top: 50%; width: calc(50% - 52px); height: 1px; background: var(--border); }
  .date-sep::before { left: 0; } .date-sep::after { right: 0; }

  .msg { display: flex; flex-direction: column; max-width: 78%; animation: fadeUp .18s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.them { align-self: flex-start; align-items: flex-start; }

  .bubble { padding: 9px 13px; border-radius: var(--radius); line-height: 1.5; word-break: break-word; }
  .msg.me .bubble { background: var(--bubble-me); color: white; border-bottom-right-radius: 5px; }
  .msg.them .bubble { background: var(--bubble-them); color: var(--text); border-bottom-left-radius: 5px; border: 1px solid var(--border); }
  .msg.me + .msg.me .bubble { border-top-right-radius: 8px; }
  .msg.them + .msg.them .bubble { border-top-left-radius: 8px; }
  .bubble img { max-width: 100%; border-radius: 10px; display: block; margin-top: 4px; }

  .msg-time { font-size: 10px; color: var(--text2); margin-top: 3px; padding: 0 4px; }

  #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text2); text-align: center; padding: 40px; }
  #empty .icon { font-size: 48px; opacity: .5; }
  #empty p { font-size: 14px; line-height: 1.6; }

  /* Input */
  #input-area { flex-shrink: 0; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 10px; }
  #msg-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; color: var(--text); font-family: 'Onest', sans-serif; font-size: 15px; resize: none; outline: none; max-height: 120px; min-height: 42px; line-height: 1.4; transition: border-color .15s; overflow-y: auto; }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text2); }
  #send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .1s; color: white; }
  #send-btn:active { transform: scale(.92); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Loading */
  #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 99; transition: opacity .3s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--text2); font-size: 13px; }

  /* Toast */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #3a1a1a; border: 1px solid #7a2a2a; color: #ff8080; padding: 8px 16px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>–ó–∞–≥—Ä—É–∂–∞–µ–º –¥–∏–∞–ª–æ–≥‚Ä¶</p>
</div>
<div id="toast"></div>

<div id="app">
  <div id="header">
    <div id="avatar">?</div>
    <div id="header-info">
      <div id="header-name">–ó–∞–≥—Ä—É–∑–∫–∞‚Ä¶</div>
      <div id="header-sub">–¥–∏–∞–ª–æ–≥</div>
    </div>
    <div id="header-ad">
      <span id="ad-price">‚Äî</span>
      <div id="ad-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">‚Ä¶</div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="–°–æ–æ–±—â–µ–Ω–∏–µ‚Ä¶" rows="1" disabled></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.disableVerticalSwipes?.();

// ‚îÄ‚îÄ –ß–∏—Ç–∞–µ–º –ø–∞—Ä–∞–º–µ—Ç—Ä—ã –∏–∑ URL ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const params   = new URLSearchParams(window.location.search);
const SESSION  = params.get('session');
// API URL –±–µ—Ä—ë—Ç—Å—è –∏–∑ –ø–∞—Ä–∞–º–µ—Ç—Ä–∞ ?api= ‚Äî –±–æ—Ç –µ–≥–æ —Å–∞–º –ø–æ–¥—Å—Ç–∞–≤–ª—è–µ—Ç
const API_BASE = (params.get('api') || '').replace(/\/$/, '');
const INIT     = tg.initData;

// ‚îÄ‚îÄ –°–æ—Å—Ç–æ—è–Ω–∏–µ ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
let viewerId = null, lastId = 0, sending = false;
let lastDate = '', pollTimer = null;

// ‚îÄ‚îÄ –£—Ç–∏–ª–∏—Ç—ã ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const $ = id => document.getElementById(id);

function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'}); } catch { return ''; }
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso), now = new Date();
    const y = new Date(now); y.setDate(now.getDate()-1);
    if (d.toDateString() === now.toDateString()) return '–°–µ–≥–æ–¥–Ω—è';
    if (d.toDateString() === y.toDateString()) return '–í—á–µ—Ä–∞';
    return d.toLocaleDateString('ru', {day:'numeric', month:'long'});
  } catch { return ''; }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function atBottom() {
  const el = $('messages');
  return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
}
function scrollDown(smooth=false) {
  const el = $('messages');
  el.scrollTo({top: el.scrollHeight, behavior: smooth ? 'smooth' : 'instant'});
}

// ‚îÄ‚îÄ –Ý–µ–Ω–¥–µ—Ä —Å–æ–æ–±—â–µ–Ω–∏–π ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function renderMsgs(msgs, append=false) {
  const box = $('messages');
  if (!append) { box.innerHTML = ''; lastDate = ''; }

  if (!msgs.length && !append) {
    box.innerHTML = `<div id="empty"><div class="icon">üí¨</div><p>–ù–∞–ø–∏—à–∏—Ç–µ –ø–µ—Ä–≤–æ–µ —Å–æ–æ–±—â–µ–Ω–∏–µ.<br>–ü—Ä–æ–¥–∞–≤–µ—Ü –æ—Ç–≤–µ—Ç–∏—Ç –≤ –±–ª–∏–∂–∞–π—à–µ–µ –≤—Ä–µ–º—è.</p></div>`;
    return;
  }

  msgs.forEach(m => {
    const isMe = m.sender_id === viewerId;
    const d = fmtDate(m.created_at);
    if (d !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep'; sep.textContent = d;
      box.appendChild(sep); lastDate = d;
    }
    const wrap = document.createElement('div');
    wrap.className = `msg ${isMe ? 'me' : 'them'}`;
    wrap.dataset.id = m.id;

    const bub = document.createElement('div');
    bub.className = 'bubble';
    if (m.msg_type === 'photo' && m.file_url) {
      const img = document.createElement('img');
      img.src = m.file_url; img.loading = 'lazy';
      bub.appendChild(img);
      if (m.text) { const c = document.createElement('div'); c.style.marginTop='6px'; c.textContent = m.text; bub.appendChild(c); }
    } else {
      bub.textContent = m.text || '';
    }
    const t = document.createElement('div');
    t.className = 'msg-time'; t.textContent = fmtTime(m.created_at);
    wrap.appendChild(bub); wrap.appendChild(t);
    box.appendChild(wrap);
    if (m.id > lastId) lastId = m.id;
  });
}

// ‚îÄ‚îÄ –ó–∞–≥—Ä—É–∑–∫–∞ –¥–∏–∞–ª–æ–≥–∞ ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function load() {
  if (!SESSION || !API_BASE) {
    $('loading').querySelector('p').textContent = '‚öÝ –°—Å—ã–ª–∫–∞ —É—Å—Ç–∞—Ä–µ–ª–∞';
    return;
  }
  try {
    const r = await fetch(`${API_BASE}/api/chat/${SESSION}`, {
      headers: {'X-Telegram-Init-Data': INIT}
    });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    viewerId = d.viewer_id;

    const name = d.other_name || `#${d.other_anon}`;
    $('avatar').textContent = name[0].toUpperCase();
    $('header-name').textContent = name;
    $('header-sub').textContent = d.other_verified ? '‚úì –í–µ—Ä–∏—Ñ–∏—Ü–∏—Ä–æ–≤–∞–Ω' : '–ø—Ä–æ–¥–∞–≤–µ—Ü';
    $('ad-price').textContent = d.ad_price ? `${d.ad_price} ‚ÇΩ` : '‚Äî';
    $('ad-title').textContent = d.ad_title || '';

    renderMsgs(d.messages || []);
    $('loading').classList.add('hidden');
    $('send-btn').disabled = false;
    $('msg-input').disabled = false;
    scrollDown();
    startPoll();
  } catch(e) {
    $('loading').querySelector('p').textContent = '–û—à–∏–±–∫–∞ –∑–∞–≥—Ä—É–∑–∫–∏';
    console.error(e);
  }
}

// ‚îÄ‚îÄ Polling ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function poll() {
  if (!SESSION || !API_BASE) return;
  try {
    const r = await fetch(`${API_BASE}/api/chat/${SESSION}/poll?after=${lastId}`, {
      headers: {'X-Telegram-Init-Data': INIT}
    });
    if (!r.ok) return;
    const d = await r.json();
    if (d.messages?.length) {
      const was = atBottom();
      renderMsgs(d.messages, true);
      if (was) scrollDown(true);
    }
  } catch {}
}
function startPoll() {
  pollTimer = setInterval(poll, 2500);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) poll(); });
}

// ‚îÄ‚îÄ –û—Ç–ø—Ä–∞–≤–∫–∞ ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
async function send() {
  if (sending) return;
  const inp = $('msg-input');
  const text = inp.value.trim();
  if (!text) return;

  sending = true;
  $('send-btn').disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  // –û–ø—Ç–∏–º–∏—Å—Ç–∏—á–Ω—ã–π –ø—É–∑—ã—Ä—å
  const tid = Date.now();
  renderMsgs([{id:tid, sender_id:viewerId, text, msg_type:'text', created_at:new Date().toISOString()}], true);
  scrollDown(true);

  try {
    const r = await fetch(`${API_BASE}/api/chat/${SESSION}/send`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-Telegram-Init-Data': INIT},
      body: JSON.stringify({text})
    });
    if (!r.ok) throw new Error('fail');
    await poll();
  } catch {
    showToast('–ù–µ —É–¥–∞–ª–æ—Å—å –æ—Ç–ø—Ä–∞–≤–∏—Ç—å');
    document.querySelector(`[data-id="${tid}"]`)?.remove();
  } finally {
    sending = false;
    $('send-btn').disabled = false;
    inp.focus();
  }
}

// ‚îÄ‚îÄ –í–≤–æ–¥ ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
$('msg-input').addEventListener('input', function() {
  autoGrow(this);
  $('send-btn').disabled = !this.value.trim();
});
$('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!$('send-btn').disabled) send(); }
});
$('send-btn').addEventListener('click', send);

tg.BackButton.show();
tg.BackButton.onClick(() => tg.close());

load();
</script>
</body>
</html>
